name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_PASSWORD
          script: |
            set -euo pipefail

            if ! command -v podman-compose >/dev/null 2>&1; then
              apt install -y podman podman-compose
            fi

            if [ ! -d /opt/vps-infra ]; then
              git clone https://github.com/mr-cal/vps-infra.git /opt/vps-infra
            fi

            cd /opt/vps-infra
            git pull origin main
            git submodule update --init --recursive

            # Ensure the shared network exists.
            podman network inspect vps-net >/dev/null 2>&1 || podman network create vps-net

            # Create or update the DB password podman secret.
            podman secret rm db_password 2>/dev/null || true
            printf '%s' "$DB_PASSWORD" | podman secret create db_password -

            # Pull images explicitly — podman-compose swallows pull exit codes.
            podman pull docker.io/library/caddy:2-alpine
            podman pull docker.io/pgvector/pgvector:pg16
            podman pull ghcr.io/mr-cal/craft-dashboard:latest

            # Restart services.
            podman-compose -f docker-compose.caddy.yml up -d
            podman-compose -f docker-compose.craft-dashboard.yml up -d

            # Verify containers are running — podman-compose swallows up exit codes
            # and podman wait exits 0 regardless of the container exit code.
            podman ps --filter name=vps-infra_caddy_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_caddy_1
            podman ps --filter name=vps-infra_postgres_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_postgres_1
            podman ps --filter name=vps-infra_craft-dashboard_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_craft-dashboard_1
