name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [pcbisolation-updated, craft-dashboard-updated, egg-calculator-updated]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REMARK_SECRET: ${{ secrets.REMARK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AKISMET_KEY: ${{ secrets.AKISMET_KEY }}
          REMARK_ADMIN_PASSWD: ${{ secrets.REMARK_ADMIN_PASSWD }}
          REMARK_ADMIN_EMAIL: ${{ secrets.REMARK_ADMIN_EMAIL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_PASSWORD,REMARK_SECRET,RESEND_API_KEY,AKISMET_KEY,REMARK_ADMIN_PASSWD,REMARK_ADMIN_EMAIL
          script: |
            set -euo pipefail

            if ! command -v podman-compose >/dev/null 2>&1; then
              apt install -y podman podman-compose
            fi

            if [ ! -d /opt/vps-infra ]; then
              git clone https://github.com/mr-cal/vps-infra.git /opt/vps-infra
            fi

            cd /opt/vps-infra
            # The server has submodule.recurse=true globally, so git pull also
            # updates submodules — before any cleanup can run. Clean stale
            # rebase dirs first, then pull without recurse, then update explicitly.
            find .git/modules -name 'rebase-merge' -type d -exec rm -rf {} + 2>/dev/null || true
            find .git/modules -name 'rebase-apply' -type d -exec rm -rf {} + 2>/dev/null || true
            git pull --no-recurse-submodules origin main
            git submodule update --checkout --remote --init --recursive

            # Install/update the startup service so the site survives reboots.
            install -m 0755 systemd/vps-infra-startup.sh /usr/local/sbin/vps-infra-startup.sh
            install -m 0644 systemd/vps-infra-startup.service /etc/systemd/system/vps-infra-startup.service
            systemctl daemon-reload
            systemctl enable vps-infra-startup.service

            # Install/update cron jobs for craft-dashboard.
            install -m 0644 cron.d/collect-data /etc/cron.d/collect-data
            install -m 0644 cron.d/backfill-snapshots /etc/cron.d/backfill-snapshots

            # Recreate the shared network on every deploy.
            # The root cause of "iptables: Chain already exists": Netavark creates
            # NETAVARK_FORWARD chains in the kernel's ip and ip6 filter tables when
            # the first container joins a network. When the network is removed,
            # Netavark leaves the chains behind (it won't delete them if they contain
            # foreign rules). On the next deploy, the first container can't join
            # because Netavark tries to create NETAVARK_FORWARD and it already exists.
            #
            # Fix: explicitly delete NETAVARK_FORWARD before recreating the network.
            # Also remove containers in reverse dependency order — craft-dashboard
            # has --requires=postgres, so Podman won't remove postgres while
            # craft-dashboard exists, even with --force.
            podman rm -f vps-infra_craft-dashboard_1 2>/dev/null || true
            podman rm -f vps-infra_remark42_1 2>/dev/null || true
            podman rm -f vps-infra_caddy_1 2>/dev/null || true
            podman rm -f vps-infra_postgres_1 2>/dev/null || true
            podman network rm vps-net 2>/dev/null || true
            nft flush chain ip filter NETAVARK_FORWARD 2>/dev/null || true
            nft delete chain ip filter NETAVARK_FORWARD 2>/dev/null || true
            nft flush chain ip6 filter NETAVARK_FORWARD 2>/dev/null || true
            nft delete chain ip6 filter NETAVARK_FORWARD 2>/dev/null || true
            podman network create --ipv6 vps-net

            # Create or update the DB password podman secret.
            podman secret rm db_password 2>/dev/null || true
            printf '%s' "$DB_PASSWORD" | podman secret create db_password -

            # Pull images explicitly — podman-compose swallows pull exit codes.
            podman pull docker.io/library/caddy:2-alpine
            podman pull docker.io/pgvector/pgvector:pg16
            podman pull ghcr.io/mr-cal/craft-dashboard:latest

            # Log pulled image details for traceability.
            echo "=== Image details ==="
            podman image inspect docker.io/library/caddy:2-alpine \
              --format 'caddy:        digest={{.Digest}} created={{index .Labels "org.opencontainers.image.created"}}'
            podman image inspect docker.io/pgvector/pgvector:pg16 \
              --format 'pgvector:     digest={{.Digest}} created={{index .Labels "org.opencontainers.image.created"}}'
            podman image inspect ghcr.io/mr-cal/craft-dashboard:latest \
              --format 'craft-dashboard: digest={{.Digest}} created={{index .Labels "org.opencontainers.image.created"}} revision={{index .Labels "org.opencontainers.image.revision"}}'

            # Restart services.
            # Note: podman-compose will emit "no such container" errors for stop/rm
            # when containers were already removed above. This is expected — podman-compose
            # tries to recreate containers whose config hash changed and errors on the
            # stop/rm of already-removed containers before successfully creating new ones.
            podman-compose -f docker-compose.caddy.yml up -d
            podman-compose -f docker-compose.craft-dashboard.yml up -d

            # Start Remark42 with secrets substituted at deploy time.
            sed \
              -e "s/REPLACE_WITH_OPENSSL_OUTPUT/$REMARK_SECRET/" \
              -e "s/REPLACE_WITH_RESEND_API_KEY/$RESEND_API_KEY/" \
              -e "s/REPLACE_WITH_AKISMET_KEY/$AKISMET_KEY/" \
              -e "s/REPLACE_WITH_ADMIN_PASSWORD/$REMARK_ADMIN_PASSWD/" \
              -e "s/REPLACE_WITH_ADMIN_EMAIL/$REMARK_ADMIN_EMAIL/" \
              docker-compose.remark42.yml > /tmp/docker-compose.remark42.rendered.yml
            podman-compose -f /tmp/docker-compose.remark42.rendered.yml up -d

            # Verify containers are running — podman-compose swallows up exit codes
            # and podman wait exits 0 regardless of the container exit code.
            podman ps --filter name=vps-infra_caddy_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_caddy_1
            podman ps --filter name=vps-infra_postgres_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_postgres_1
            podman ps --filter name=vps-infra_craft-dashboard_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_craft-dashboard_1
            podman ps --filter name=vps-infra_remark42_1 --filter status=running --format '{{.Names}}' | grep -q vps-infra_remark42_1

            # Podman's NETAVARK_FORWARD chain is created when the first container
            # starts. Add the missing rules that allow new inbound connections.
            # Use the actual subnets assigned to vps-net (they may change when the
            # network is recreated).
            SUBNET=$(podman network inspect vps-net --format '{{range .Subnets}}{{.Subnet}} {{end}}' | tr ' ' '\n' | grep -v ':' | head -1)
            IPV6_SUBNET=$(podman network inspect vps-net --format '{{range .Subnets}}{{.Subnet}} {{end}}' | tr ' ' '\n' | grep ':' | head -1)
            nft insert rule ip filter NETAVARK_FORWARD ip daddr "$SUBNET" ct state new accept 2>/dev/null || true
            nft insert rule ip6 filter NETAVARK_FORWARD ip6 daddr "$IPV6_SUBNET" ct state new accept 2>/dev/null || true

            # Fix netavark's broken IPv6 DNAT rules. Netavark generates rules with
            # 'ip6 daddr ::' (the unspecified address), which never matches real traffic.
            # Add correct rules without a destination constraint to both:
            #   PREROUTING: for inbound traffic from external IPv6 clients
            #   OUTPUT: for traffic originating from the VPS itself (the deploy health check)
            # Use a comment tag to safely delete stale rules from previous deploys before
            # inserting fresh ones pointing at the current container's IPv6 address.
            CADDY_IPV6=$(podman inspect vps-infra_caddy_1 \
              --format '{{range .NetworkSettings.Networks}}{{.GlobalIPv6Address}}{{end}}')
            for CHAIN in PREROUTING OUTPUT; do
              for PORT in 80 443; do
                while ip6tables -t nat -D "$CHAIN" -p tcp --dport "$PORT" \
                    -m comment --comment "vps-infra-ipv6-dnat" -j DNAT 2>/dev/null; do true; done
                ip6tables -t nat -I "$CHAIN" 1 -p tcp --dport "$PORT" \
                  -m comment --comment "vps-infra-ipv6-dnat" \
                  -j DNAT --to-destination ["$CADDY_IPV6"]:"$PORT"
              done
            done

            # Verify IPv4 reachability. The check runs on the VPS, so use --resolve
            # to avoid routing through the external IP (which times out when
            # connecting to self). Poll up to 60s to allow for DB migrations.
            echo "Waiting for craft-dashboard to come up (IPv4)..."
            for i in $(seq 1 12); do
              STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --max-time 10 \
                --resolve craft-dashboard.name:443:127.0.0.1 \
                --resolve craft-dashboard.name:80:127.0.0.1 \
                https://craft-dashboard.name/ 2>/dev/null)
              echo "  attempt $i: $STATUS"
              [ "$STATUS" = "200" ] && break
              sleep 5
            done
            [ "$STATUS" = "200" ] || { echo "ERROR: craft-dashboard did not come up on IPv4 (last status: $STATUS)"; exit 1; }
            echo "craft-dashboard is up on IPv4."

            # Verify IPv6 reachability using the server's public IPv6 address.
            IPV6_ADDR=$(ip -6 addr show eth0 scope global | awk '/inet6/{print $2}' | cut -d/ -f1 | head -1)
            echo "Checking IPv6 reachability via $IPV6_ADDR..."
            STATUS6=$(curl -6 -s -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve "craft-dashboard.name:443:[$IPV6_ADDR]" \
              https://craft-dashboard.name/ 2>/dev/null)
            echo "  IPv6 status: $STATUS6"
            [ "$STATUS6" = "200" ] || { echo "ERROR: craft-dashboard did not come up on IPv6 (status: $STATUS6)"; exit 1; }
            echo "craft-dashboard is up on IPv6."

            # Verify eggcalculator.com (static site served by Caddy).
            EGG_STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve eggcalculator.com:443:127.0.0.1 \
              https://eggcalculator.com/ 2>/dev/null)
            echo "eggcalculator.com status: $EGG_STATUS"
            [ "$EGG_STATUS" = "200" ] || { echo "ERROR: eggcalculator.com did not come up (status: $EGG_STATUS)"; exit 1; }
            echo "eggcalculator.com is up."

            # Verify pcbisolation.com (Hugo static site).
            # Use HTTP: Caddy can't issue a TLS cert via ACME until DNS points to this VPS,
            # so port 443 is unavailable pre-cutover. Port 80 returns 308→HTTPS, confirming
            # Caddy is up and serving the domain.
            PCB_STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve pcbisolation.com:80:127.0.0.1 \
              http://pcbisolation.com/ 2>/dev/null)
            echo "pcbisolation.com status: $PCB_STATUS"
            [[ "$PCB_STATUS" = "200" || "$PCB_STATUS" = "301" || "$PCB_STATUS" = "308" ]] || \
              { echo "ERROR: pcbisolation.com did not come up (status: $PCB_STATUS)"; exit 1; }
            echo "pcbisolation.com is up."

            # Verify comments.pcbisolation.com (Remark42) — same pre-DNS caveat.
            REMARK_STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve comments.pcbisolation.com:80:127.0.0.1 \
              http://comments.pcbisolation.com/api/v1/ping 2>/dev/null)
            echo "comments.pcbisolation.com status: $REMARK_STATUS"
            [[ "$REMARK_STATUS" = "200" || "$REMARK_STATUS" = "301" || "$REMARK_STATUS" = "308" ]] || \
              { echo "ERROR: Remark42 did not come up (status: $REMARK_STATUS)"; exit 1; }
            echo "comments.pcbisolation.com is up."
