# craft-dashboard application and its PostgreSQL database.

services:
  craft-dashboard:
    image: ghcr.io/mr-cal/craft-dashboard:latest
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vps-net
    restart: on-failure

  postgres:
    image: docker.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: craft_dashboard
      POSTGRES_USER: craft_dashboard
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craft_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vps-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  vps-net:
    external: true

secrets:
  db_password:
    external: true
